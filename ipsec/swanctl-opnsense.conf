# swanctl.conf — OPNSense host (192.168.1.1)
#
# Transport-mode IPsec SA protecting VRRPv3 (IP proto 112) to the peer.
# VRRPv3 has no in-packet auth (RFC 5798 §9); this SA is what authenticates
# and encrypts the advertisement link. See PLAN.md §6 and README "Security".
#
# Install: drop this into /usr/local/etc/swanctl/conf.d/vrrp-ha.conf on the
# OPNSense box, put the PSK in the secrets block below (or a separate file),
# then:   swanctl --load-all   (or configctl ipsec reload)
#
# The stock OPNSense IPsec GUI is tunnel-oriented; a transport-mode,
# single-protocol (proto 112) SA is cleanest via this manual swanctl drop-in.

connections {
    vrrp-ha {
        version      = 2                 # IKEv2
        local_addrs  = 192.168.1.1
        remote_addrs = 192.168.1.3

        # Keep the SA up proactively so policy=require never drops the first
        # advert waiting for negotiation. DPD tears down a dead peer fast.
        dpd_delay    = 10s
        dpd_timeout  = 30s
        rekey_time   = 4h

        local {
            auth = psk
            id   = 192.168.1.1
        }
        remote {
            auth = psk
            id   = 192.168.1.3
        }

        children {
            vrrp {
                mode          = transport      # host-to-host, keeps TTL=255
                local_ts      = 192.168.1.1[112]   # VRRP = IP proto 112
                remote_ts     = 192.168.1.3[112]
                esp_proposals = aes256gcm16
                # POLICY REQUIRE: unprotected VRRP is dropped, no auth bypass.
                # 'start' initiates the SA immediately (this host is initiator).
                start_action  = start
                dpd_action    = restart
                close_action  = restart
            }
        }
    }
}

secrets {
    ike-vrrp {
        id-1   = 192.168.1.1
        id-2   = 192.168.1.3
        # Replace with a long random pre-shared key. MUST match the peer.
        # Generate:  openssl rand -base64 32
        secret = "REPLACE_WITH_SHARED_PSK"
    }
}
