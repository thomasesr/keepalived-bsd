# swanctl.conf — OpenWRT / Linux peer (192.168.1.3)
#
# Mirror of swanctl-opnsense.conf. Same PSK, selectors reversed. Protects the
# VRRPv3 (IP proto 112) link to the OPNSense box (192.168.1.1).
#
# Requires strongSwan with swanctl (OpenWRT: `strongswan-full`, or
# `strongswan-mod-*` incl. openssl/kernel-netlink/socket-default). Install into
# /etc/swanctl/conf.d/vrrp-ha.conf then:  swanctl --load-all
#
# Legacy strongSwan (ipsec.conf/starter) alternative shown at the bottom.

connections {
    vrrp-ha {
        version      = 2                 # IKEv2
        local_addrs  = 192.168.1.3
        remote_addrs = 192.168.1.1

        dpd_delay    = 10s
        dpd_timeout  = 30s
        rekey_time   = 4h

        local {
            auth = psk
            id   = 192.168.1.3
        }
        remote {
            auth = psk
            id   = 192.168.1.1
        }

        children {
            vrrp {
                mode          = transport
                local_ts      = 192.168.1.3[112]
                remote_ts     = 192.168.1.1[112]
                esp_proposals = aes256gcm16
                # Responder side: 'trap' installs the policy and negotiates on
                # first matching packet. The OPNSense side uses 'start'.
                start_action  = trap
                dpd_action    = restart
                close_action  = restart
            }
        }
    }
}

secrets {
    ike-vrrp {
        id-1   = 192.168.1.1
        id-2   = 192.168.1.3
        secret = "REPLACE_WITH_SHARED_PSK"   # MUST match the OPNSense box
    }
}

# ---------------------------------------------------------------------------
# Legacy strongSwan (ipsec.conf + ipsec.secrets), if swanctl is unavailable:
#
#   # /etc/ipsec.conf
#   conn vrrp-ha
#       keyexchange=ikev2
#       type=transport
#       left=192.168.1.3
#       right=192.168.1.1
#       leftprotoport=112
#       rightprotoport=112
#       authby=secret
#       esp=aes256gcm16
#       dpdaction=restart
#       auto=route
#
#   # /etc/ipsec.secrets
#   192.168.1.3 192.168.1.1 : PSK "REPLACE_WITH_SHARED_PSK"
# ---------------------------------------------------------------------------
