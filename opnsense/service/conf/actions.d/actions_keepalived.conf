[start]
command:/usr/local/etc/rc.d/keepalived_bsd onestart
parameters:
type:script
message:starting keepalived-bsd

[stop]
command:/usr/local/etc/rc.d/keepalived_bsd onestop
parameters:
type:script
message:stopping keepalived-bsd

[restart]
command:/usr/local/etc/rc.d/keepalived_bsd onerestart
parameters:
type:script
message:restarting keepalived-bsd

[status]
command:/usr/local/etc/rc.d/keepalived_bsd onestatus || true
parameters:
type:script_output
message:getting keepalived-bsd status

[status_detail]
command:/bin/cat /var/run/keepalived_bsd.status 2>/dev/null || echo '{}'
parameters:
type:script_output
message:getting keepalived-bsd VRRP instance status

[reconfigure]
command:/usr/local/bin/php /usr/local/opnsense/scripts/OPNsense/Keepalived/reconfigure.php
parameters:
type:script_output
message:applying keepalived-bsd configuration
